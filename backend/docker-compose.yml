version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: emotionai_postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=emotionai_db
      - POSTGRES_USER=emotion_user
      - POSTGRES_PASSWORD=secure_db_pass_2026
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: emotionai_web_app
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             gunicorn emotionai_project.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=emotionai_db
      - DB_USER=emotion_user
      - DB_PASSWORD=secure_db_pass_2026
      - DB_HOST=db
      - DB_PORT=5432
      - GEMINI_API_KEY=YOUR_SECURE_GEMINI_API_KEY
      - DJANGO_SECRET_KEY=django-insecure-prod-saas-key-2026-very-secure
      - DJANGO_DEBUG=False
    depends_on:
      - db

volumes:
  postgres_data:
